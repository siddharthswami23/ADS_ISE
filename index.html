<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-gilroy: 'gilroy';
      }
      @font-face {
        font-family: 'gilroy';
        src: url('./Gilroy-Regular.ttf');
      }
      .bubble {
        @apply w-[60px] h-[60px] bg-[rgb(53,92,53)] text-white rounded-full flex items-center justify-center font-semibold text-[1.5vw] cursor-pointer hover:bg-[rgb(36,120,36)];
      }
    </style>
  </head>
  <body class="m-0 p-0 box-border font-gilroy w-full h-full">
    <div id="main" class="w-full h-screen bg-[rgb(130,181,130)] flex items-center justify-center">
      <div id="panel" class="w-[90%] h-[90%] bg-white rounded-[5px] overflow-hidden">
        <div id="ptop" class="px-[20vw] w-full h-[10vh] bg-[rgb(36,120,36)] flex items-center justify-between text-white">
          <div class="elem capitalize flex items-center gap-5">
            <h2>hit</h2>
            <div id="hitValue" class="box py-[10px] px-[20px] bg-white text-[#111] font-bold text-[25px] rounded-[5px]"></div>
          </div>
          <div class="elem capitalize flex items-center gap-5">
            <h2>timer</h2>
            <div id="timerValue" class="box py-[10px] px-[20px] bg-white text-[#111] font-bold text-[25px] rounded-[5px]"></div>
          </div>
          <div class="elem capitalize flex items-center gap-5">
            <h2>score</h2>
            <div id="scoreValue" class="box py-[10px] px-[20px] bg-white text-[#111] font-bold text-[25px] rounded-[5px]">0</div>
          </div>
        </div>
        <div id="pbtm" class="overflow-hidden p-5 w-full h-[calc(100%-10vh)] flex gap-[10px] flex-wrap relative"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
